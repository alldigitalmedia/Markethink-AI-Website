<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Polished Markethink dashboard mockup</title>
  <desc id="desc">A translated English Markethink dashboard displayed inside a dimensional browser mockup, showing campaigns, approvals, leads, web, email, and agent conversations in one workspace.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F5F5F1"/>
      <stop offset="0.58" stop-color="#EDF4EA"/>
      <stop offset="1" stop-color="#F5F5F1"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#F5F5F1"/>
      <stop offset="1" stop-color="#E7EFE4"/>
    </linearGradient>
    <linearGradient id="darkbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0F1213"/>
      <stop offset="0.7" stop-color="#171B1C"/>
      <stop offset="1" stop-color="#0F1213"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#69D254" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#69D254" stop-opacity="0.24"/>
    </linearGradient>
    <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="32" stdDeviation="34" flood-color="#0F1213" flood-opacity="0.22"/>
    </filter>
    <filter id="cardShadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0F1213" flood-opacity="0.13"/>
    </filter>
    <clipPath id="browserClip">
      <rect x="74" y="84" width="1052" height="632" rx="38"/>
    </clipPath>
    <style>
      .label{font-family:Inter,Arial,sans-serif;fill:#686B6C;font-size:18px;font-weight:600}.tiny{font-family:Inter,Arial,sans-serif;fill:#686B6C;font-size:14px;font-weight:600}.nav{font-family:Inter,Arial,sans-serif;fill:#B4B6B6;font-size:15px;font-weight:600}.h1{font-family:Georgia,'Instrument Serif',serif;fill:#0F1213;font-size:58px;font-weight:600;letter-spacing:-2px}.body{font-family:Inter,Arial,sans-serif;fill:#686B6C;font-size:20px;font-weight:500}.cardTitle{font-family:Inter,Arial,sans-serif;fill:#0F1213;font-size:17px;font-weight:700}.num{font-family:Inter,Arial,sans-serif;fill:#0F1213;font-size:34px;font-weight:800}.pill{font-family:Inter,Arial,sans-serif;fill:#0F1213;font-size:14px;font-weight:700}.micro{font-family:Inter,Arial,sans-serif;fill:#8B8E8E;font-size:12px;font-weight:600}.whiteText{font-family:Inter,Arial,sans-serif;fill:#F5F5F1;font-size:14px;font-weight:700}.logo{font-family:Inter,Arial,sans-serif;fill:#F5F5F1;font-size:28px;font-weight:800;letter-spacing:-1px}
    </style>
  </defs>

  <rect width="1200" height="800" fill="url(#page)"/>
  <circle cx="1000" cy="140" r="210" fill="#69D254" opacity="0.12"/>
  <circle cx="170" cy="690" r="260" fill="#0F1213" opacity="0.05"/>

  <g filter="url(#softShadow)">
    <path d="M82 92 C82 68 101 49 125 49 H1066 C1108 49 1140 83 1135 125 L1072 674 C1069 704 1044 727 1014 727 H141 C107 727 80 699 82 665 Z" fill="#0F1213" opacity="0.11"/>
    <rect x="64" y="68" width="1072" height="656" rx="42" fill="#0F1213" opacity="0.10" transform="skewY(-1.2)"/>
    <rect x="74" y="84" width="1052" height="632" rx="38" fill="url(#screen)" stroke="rgba(15,18,19,0.10)" stroke-width="2"/>
  </g>

  <g clip-path="url(#browserClip)">
    <rect x="74" y="84" width="1052" height="70" fill="url(#darkbar)"/>
    <text x="104" y="129" class="logo">Markethink</text>
    <text x="308" y="128" class="nav">Agent</text>
    <rect x="379" y="104" width="78" height="34" rx="17" fill="#F5F5F1" opacity="0.12" stroke="#69D254" stroke-opacity="0.45"/>
    <text x="401" y="127" class="whiteText">Home</text>
    <text x="494" y="128" class="nav">Campaigns</text>
    <text x="604" y="128" class="nav">Social</text>
    <text x="687" y="128" class="nav">Web</text>
    <text x="746" y="128" class="nav">Email</text>
    <text x="816" y="128" class="nav">Leads</text>
    <text x="887" y="128" class="nav">Brand</text>
    <rect x="999" y="105" width="78" height="32" rx="16" fill="#69D254" opacity="0.18"/>
    <circle cx="1017" cy="121" r="5" fill="#69D254"/>
    <text x="1030" y="127" class="whiteText">Live</text>

    <rect x="74" y="154" width="1052" height="562" fill="#F5F5F1"/>

    <rect x="104" y="184" width="1010" height="266" rx="28" fill="#FFFFFF"/>
    <rect x="690" y="184" width="424" height="266" fill="#EAF1E7"/>
    <path d="M690 450 H1114 V184 C1065 218 1023 253 988 291 C943 340 911 394 898 450 Z" fill="#0F1213" opacity="0.08"/>
    <path d="M930 220 C990 226 1043 261 1074 314 C1090 343 1098 375 1096 411" fill="none" stroke="#69D254" stroke-width="8" stroke-linecap="round" opacity="0.82"/>
    <path d="M742 352 C785 340 836 346 884 369 C925 389 961 416 1001 425" fill="none" stroke="#0F1213" stroke-width="2" opacity="0.18"/>
    <path d="M760 267 H892 M760 289 H846 M760 311 H930" stroke="#69D254" stroke-width="6" stroke-linecap="round" opacity="0.55"/>
    <rect x="944" y="248" width="140" height="52" rx="16" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <text x="964" y="280" class="pill">Active campaigns</text>
    <text x="1051" y="282" class="num" font-size="24">4</text>
    <rect x="920" y="318" width="164" height="52" rx="16" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <text x="940" y="350" class="pill">Pending approvals</text>
    <text x="1050" y="352" class="num" font-size="24">44</text>
    <rect x="958" y="388" width="126" height="52" rx="16" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <text x="978" y="420" class="pill">Live assets</text>
    <text x="1058" y="422" class="num" font-size="24">5</text>

    <text x="142" y="260" class="label">Good morning, team 👋</text>
    <text x="142" y="315" class="h1">What can we move today?</text>
    <text x="142" y="357" class="body">Markethink is organizing the work and bringing</text>
    <text x="142" y="383" class="body">you the right decisions to approve.</text>
    <rect x="142" y="408" width="172" height="48" rx="24" fill="#0F1213" filter="url(#cardShadow)"/>
    <circle cx="168" cy="432" r="4" fill="#69D254"/>
    <text x="184" y="438" class="whiteText">Ask the operator</text>

    <rect x="104" y="476" width="292" height="216" rx="22" fill="#FFFFFF" stroke="#E5E7E3"/>
    <text x="126" y="511" class="cardTitle">Daily summary</text>
    <text x="126" y="548" class="tiny">Here is what needs attention today.</text>
    <g transform="translate(126 578)">
      <rect width="72" height="84" rx="16" fill="#EDF4EA"/>
      <circle cx="36" cy="24" r="12" fill="#FFFFFF"/><text x="30" y="30" class="pill">4</text><text x="22" y="57" class="num">4</text><text x="15" y="75" class="micro">Campaigns</text>
      <rect x="88" width="72" height="84" rx="16" fill="#F7F3DF"/>
      <circle cx="124" cy="24" r="12" fill="#FFFFFF"/><text x="119" y="30" class="pill">✓</text><text x="109" y="57" class="num">44</text><text x="104" y="75" class="micro">Approvals</text>
      <rect x="176" width="72" height="84" rx="16" fill="#ECF3F9"/>
      <circle cx="212" cy="24" r="12" fill="#FFFFFF"/><text x="207" y="30" class="pill">•</text><text x="198" y="57" class="num">5</text><text x="194" y="75" class="micro">Live</text>
    </g>

    <rect x="420" y="476" width="392" height="216" rx="22" fill="#FFFFFF" stroke="#E5E7E3"/>
    <text x="444" y="511" class="cardTitle">Needs attention</text>
    <circle cx="586" cy="505" r="12" fill="#0F1213"/><text x="582" y="510" class="whiteText" font-size="10">4</text>
    <rect x="444" y="542" width="336" height="58" rx="16" fill="#F8F8F5"/>
    <rect x="462" y="554" width="42" height="34" rx="10" fill="#0F1213"/>
    <text x="474" y="577" class="whiteText">LI</text>
    <text x="522" y="563" class="micro" fill="#69D254">REQUIRES APPROVAL</text>
    <text x="522" y="584" class="cardTitle">Initial lead list</text>
    <rect x="706" y="554" width="58" height="34" rx="17" fill="#0F1213"/><text x="721" y="576" class="whiteText">Review</text>
    <rect x="444" y="614" width="336" height="58" rx="16" fill="#F8F8F5"/>
    <rect x="462" y="626" width="42" height="34" rx="10" fill="#0F1213"/>
    <text x="476" y="649" class="whiteText">W</text>
    <text x="522" y="635" class="micro" fill="#69D254">REQUIRES APPROVAL</text>
    <text x="522" y="656" class="cardTitle">Landing page update</text>
    <rect x="706" y="626" width="58" height="34" rx="17" fill="#0F1213"/><text x="721" y="648" class="whiteText">Review</text>

    <rect x="836" y="476" width="278" height="216" rx="22" fill="#FFFFFF" stroke="#E5E7E3"/>
    <text x="858" y="511" class="cardTitle">Operator</text>
    <rect x="1025" y="492" width="64" height="26" rx="13" fill="#69D254" opacity="0.22"/>
    <circle cx="1044" cy="505" r="5" fill="#69D254"/>
    <text x="1054" y="510" class="micro">Online</text>
    <rect x="858" y="534" width="226" height="92" rx="16" fill="#EDF4EA" stroke="#D7E5D4"/>
    <text x="878" y="564" class="tiny">Can you turn this lead signal</text>
    <text x="878" y="587" class="tiny">into a campaign and draft</text>
    <text x="878" y="610" class="tiny">the follow-up email?</text>
    <rect x="858" y="642" width="190" height="34" rx="17" fill="#0F1213"/>
    <circle cx="880" cy="659" r="5" fill="#69D254"/>
    <text x="894" y="664" class="whiteText">Next move prepared</text>
  </g>

  <path d="M168 735 H1030" stroke="#0F1213" stroke-opacity="0.12" stroke-width="18" stroke-linecap="round"/>
  <path d="M182 732 H1016" stroke="#69D254" stroke-opacity="0.18" stroke-width="5" stroke-linecap="round"/>
</svg>
