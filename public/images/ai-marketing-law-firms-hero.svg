<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Law firm marketing system diagram</title>
  <desc id="desc">A Markethink style workflow showing law firm practice areas, campaigns, approvals, intake, and follow-up.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#0F1213"/><stop offset="1" stop-color="#1B201F"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000" flood-opacity="0.32"/></filter>
  </defs>
  <rect width="1200" height="800" rx="36" fill="url(#bg)"/>
  <circle cx="1060" cy="120" r="220" fill="#69D254" opacity="0.12"/>
  <circle cx="80" cy="700" r="240" fill="#EDF4EA" opacity="0.08"/>
  <g filter="url(#shadow)">
    <rect x="84" y="90" width="1032" height="620" rx="28" fill="#F5F5F1"/>
    <rect x="84" y="90" width="1032" height="74" rx="28" fill="#EDF4EA"/>
    <circle cx="132" cy="127" r="10" fill="#69D254"/><circle cx="166" cy="127" r="10" fill="#B4B6B6"/><circle cx="200" cy="127" r="10" fill="#686B6C"/>
    <text x="244" y="135" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#0F1213">Law Firm Marketing System</text>
    <g transform="translate(130 210)">
      <rect width="250" height="138" rx="22" fill="#0F1213"/>
      <text x="24" y="40" font-family="Inter, Arial" font-size="15" font-weight="700" fill="#69D254">PRACTICE AREAS</text>
      <rect x="24" y="62" width="170" height="10" rx="5" fill="#F5F5F1" opacity=".9"/><rect x="24" y="86" width="204" height="10" rx="5" fill="#F5F5F1" opacity=".55"/><rect x="24" y="110" width="132" height="10" rx="5" fill="#F5F5F1" opacity=".45"/>
    </g>
    <g transform="translate(475 210)">
      <rect width="250" height="138" rx="22" fill="#EDF4EA" stroke="#D7E6D2"/>
      <text x="24" y="40" font-family="Inter, Arial" font-size="15" font-weight="700" fill="#0F1213">CAMPAIGN + SEO</text>
      <rect x="24" y="62" width="190" height="10" rx="5" fill="#0F1213" opacity=".75"/><rect x="24" y="86" width="158" height="10" rx="5" fill="#0F1213" opacity=".42"/><rect x="24" y="110" width="205" height="10" rx="5" fill="#69D254"/>
    </g>
    <g transform="translate(820 210)">
      <rect width="250" height="138" rx="22" fill="#0F1213"/>
      <text x="24" y="40" font-family="Inter, Arial" font-size="15" font-weight="700" fill="#69D254">APPROVALS</text>
      <circle cx="34" cy="72" r="10" fill="#69D254"/><rect x="54" y="66" width="148" height="10" rx="5" fill="#F5F5F1" opacity=".75"/>
      <circle cx="34" cy="102" r="10" fill="#69D254"/><rect x="54" y="96" width="174" height="10" rx="5" fill="#F5F5F1" opacity=".48"/>
    </g>
    <path d="M390 279 C420 279 438 279 462 279" fill="none" stroke="#69D254" stroke-width="5" stroke-linecap="round"/>
    <path d="M735 279 C765 279 783 279 807 279" fill="none" stroke="#69D254" stroke-width="5" stroke-linecap="round"/>
    <g transform="translate(212 455)">
      <rect width="330" height="145" rx="24" fill="#EDF4EA" stroke="#D7E6D2"/>
      <text x="26" y="42" font-family="Inter, Arial" font-size="16" font-weight="800" fill="#0F1213">INTAKE CONTEXT</text>
      <text x="26" y="76" font-family="Inter, Arial" font-size="18" fill="#0F1213" opacity=".72">Form, call, referral, source</text>
      <rect x="26" y="102" width="210" height="12" rx="6" fill="#69D254"/>
    </g>
    <g transform="translate(658 455)">
      <rect width="330" height="145" rx="24" fill="#0F1213"/>
      <text x="26" y="42" font-family="Inter, Arial" font-size="16" font-weight="800" fill="#69D254">FOLLOW-UP</text>
      <text x="26" y="76" font-family="Inter, Arial" font-size="18" fill="#F5F5F1" opacity=".74">Next step, CRM note, reply</text>
      <rect x="26" y="102" width="250" height="12" rx="6" fill="#F5F5F1" opacity=".55"/>
    </g>
    <path d="M600 350 L600 412" stroke="#69D254" stroke-width="5" stroke-linecap="round"/>
    <path d="M552 528 C590 528 612 528 646 528" fill="none" stroke="#69D254" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
