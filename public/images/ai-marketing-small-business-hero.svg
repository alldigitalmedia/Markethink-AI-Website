<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc"><title id="title">Markethink small business marketing system</title><desc id="desc">A dark editorial system diagram showing business context flowing into campaigns, approvals, content and client opportunities.</desc><rect width="1200" height="900" rx="48" fill="#0F1213"/><circle cx="992" cy="152" r="164" fill="#69D254" fill-opacity="0.16"/><circle cx="198" cy="774" r="220" fill="#EDF4EA" fill-opacity="0.07"/><rect x="88" y="86" width="428" height="728" rx="32" fill="#171B1C" stroke="#2A2F30"/><text x="130" y="154" fill="#F5F5F1" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Business context</text><text x="130" y="194" fill="#B4B6B6" font-family="Inter, Arial, sans-serif" font-size="17">The inputs small teams usually keep scattered.</text><g font-family="Inter, Arial, sans-serif"><rect x="130" y="252" width="308" height="66" rx="18" fill="#F5F5F1" fill-opacity="0.08" stroke="#F5F5F1" stroke-opacity="0.12"/><circle cx="166" cy="285" r="10" fill="#69D254"/><text x="194" y="291" fill="#F5F5F1" font-size="20" font-weight="600">Offers</text><rect x="130" y="342" width="308" height="66" rx="18" fill="#F5F5F1" fill-opacity="0.08" stroke="#F5F5F1" stroke-opacity="0.12"/><circle cx="166" cy="375" r="10" fill="#69D254"/><text x="194" y="381" fill="#F5F5F1" font-size="20" font-weight="600">Audience</text><rect x="130" y="432" width="308" height="66" rx="18" fill="#F5F5F1" fill-opacity="0.08" stroke="#F5F5F1" stroke-opacity="0.12"/><circle cx="166" cy="465" r="10" fill="#69D254"/><text x="194" y="471" fill="#F5F5F1" font-size="20" font-weight="600">Voice</text><rect x="130" y="522" width="308" height="66" rx="18" fill="#F5F5F1" fill-opacity="0.08" stroke="#F5F5F1" stroke-opacity="0.12"/><circle cx="166" cy="555" r="10" fill="#69D254"/><text x="194" y="561" fill="#F5F5F1" font-size="20" font-weight="600">Approvals</text></g><rect x="602" y="116" width="510" height="648" rx="36" fill="#F5F5F1"/><text x="648" y="184" fill="#0F1213" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Weekly marketing system</text><text x="648" y="226" fill="#686B6C" font-family="Inter, Arial, sans-serif" font-size="17">Campaigns, decisions, assets and follow-up in one rhythm.</text><rect x="648" y="286" width="188" height="116" rx="24" fill="#EDF4EA" stroke="#D7E7D1"/><text x="676" y="334" fill="#0F1213" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Plan</text><text x="676" y="365" fill="#686B6C" font-family="Inter, Arial, sans-serif" font-size="15">Message, offer, channel</text><rect x="878" y="286" width="188" height="116" rx="24" fill="#EDF4EA" stroke="#D7E7D1"/><text x="906" y="334" fill="#0F1213" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Create</text><text x="906" y="365" fill="#686B6C" font-family="Inter, Arial, sans-serif" font-size="15">Web, social, blog</text><rect x="648" y="444" width="188" height="116" rx="24" fill="#EDF4EA" stroke="#D7E7D1"/><text x="676" y="492" fill="#0F1213" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Review</text><text x="676" y="523" fill="#686B6C" font-family="Inter, Arial, sans-serif" font-size="15">Feedback becomes memory</text><rect x="878" y="444" width="188" height="116" rx="24" fill="#69D254"/><text x="906" y="492" fill="#0F1213" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Ship</text><text x="906" y="523" fill="#0F1213" fill-opacity="0.72" font-family="Inter, Arial, sans-serif" font-size="15">Campaigns keep moving</text><rect x="684" y="624" width="346" height="62" rx="31" fill="#0F1213"/><text x="729" y="663" fill="#F5F5F1" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">More clients, less guesswork</text><path d="M516 450C548 450 568 450 602 450" stroke="#69D254" stroke-width="4" stroke-linecap="round"/><path d="M578 430L602 450L578 470" stroke="#69D254" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>