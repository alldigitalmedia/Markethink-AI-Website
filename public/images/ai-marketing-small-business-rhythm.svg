<svg width="1100" height="620" viewBox="0 0 1100 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc"><title id="title">Small business marketing rhythm</title><desc id="desc">A Markethink workflow diagram showing audit, campaign plan, production, approval memory and client opportunity follow-up.</desc><rect width="1100" height="620" rx="40" fill="#EDF4EA"/><rect x="44" y="48" width="1012" height="524" rx="32" fill="#F5F5F1" stroke="#DDE8D8"/><text x="92" y="122" fill="#0F1213" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="750">The weekly rhythm Markethink builds around your business</text><text x="92" y="158" fill="#686B6C" font-family="Inter, Arial, sans-serif" font-size="17">A practical operating loop for small teams: clear priorities, reviewable assets, remembered decisions.</text><g font-family="Inter, Arial, sans-serif"><rect x="92" y="234" width="164" height="164" rx="28" fill="#0F1213"/><text x="124" y="284" fill="#69D254" font-size="15" font-weight="700">01</text><text x="124" y="322" fill="#F5F5F1" font-size="23" font-weight="700">Audit</text><text x="124" y="352" fill="#B4B6B6" font-size="14">Find the gaps</text><rect x="306" y="234" width="164" height="164" rx="28" fill="#EDF4EA" stroke="#CFE2C8"/><text x="338" y="284" fill="#0F1213" font-size="15" font-weight="700">02</text><text x="338" y="322" fill="#0F1213" font-size="23" font-weight="700">Plan</text><text x="338" y="352" fill="#686B6C" font-size="14">Choose the campaign</text><rect x="520" y="234" width="164" height="164" rx="28" fill="#EDF4EA" stroke="#CFE2C8"/><text x="552" y="284" fill="#0F1213" font-size="15" font-weight="700">03</text><text x="552" y="322" fill="#0F1213" font-size="23" font-weight="700">Create</text><text x="552" y="352" fill="#686B6C" font-size="14">Build the assets</text><rect x="734" y="234" width="164" height="164" rx="28" fill="#EDF4EA" stroke="#CFE2C8"/><text x="766" y="284" fill="#0F1213" font-size="15" font-weight="700">04</text><text x="766" y="322" fill="#0F1213" font-size="23" font-weight="700">Approve</text><text x="766" y="352" fill="#686B6C" font-size="14">Capture decisions</text><rect x="890" y="428" width="118" height="44" rx="22" fill="#69D254"/><text x="915" y="456" fill="#0F1213" font-size="14" font-weight="700">Follow up</text></g><path d="M256 316H306" stroke="#0F1213" stroke-opacity="0.25" stroke-width="2"/><path d="M470 316H520" stroke="#0F1213" stroke-opacity="0.25" stroke-width="2"/><path d="M684 316H734" stroke="#0F1213" stroke-opacity="0.25" stroke-width="2"/><path d="M816 398C816 450 850 450 890 450" stroke="#0F1213" stroke-opacity="0.25" stroke-width="2"/><path d="M196 438C320 500 626 514 890 450" stroke="#69D254" stroke-opacity="0.55" stroke-width="3" stroke-dasharray="9 12"/><circle cx="196" cy="438" r="8" fill="#69D254"/><circle cx="890" cy="450" r="8" fill="#69D254"/></svg>